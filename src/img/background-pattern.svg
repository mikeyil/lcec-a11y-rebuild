<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 900">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2d0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#556b2f;stop-opacity:1" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  
  <!-- Base gradient -->
  <rect width="1920" height="900" fill="url(#bgGradient)"/>
  
  <!-- Decorative geometric shapes -->
  <circle cx="200" cy="100" r="150" fill="#a4c639" opacity="0.15" filter="url(#blur)"/>
  <circle cx="1800" cy="800" r="200" fill="#a4c639" opacity="0.1" filter="url(#blur)"/>
  <polygon points="0,0 300,0 150,300" fill="#a4c639" opacity="0.08" filter="url(#blur)"/>
  <polygon points="1920,900 1620,900 1770,600" fill="#a4c639" opacity="0.08" filter="url(#blur)"/>
  
  <!-- Additional accent circles -->
  <circle cx="960" cy="450" r="100" fill="#a4c639" opacity="0.05" filter="url(#blur)"/>
</svg>
